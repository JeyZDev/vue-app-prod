name: 'build and deploy production'

on:
  push:
    tags:
      - '*'

jobs:
  release-docker-image-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare lowercase repo name
        id: prep
        run: |
          # เอาแค่ชื่อ repo มาทำตัวเล็ก (เช่น vue-app-prod)
          REPO_ONLY_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lc=$REPO_ONLY_LC" >> $GITHUB_OUTPUT

      - name: Build image and push to GitHub Packages
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          # แก้ตรงนี้: ใส่เฉพาะชื่อ repo (ตัวพิมพ์เล็ก)
          image: ${{ steps.prep.outputs.repo_lc }}
          registry: ghcr.io
          username: jeyzdev
          password: ${{ secrets.GITHUB_TOKEN }}
          addLatestTag: true

  auto-deploy-docker-job:
    needs: release-docker-image-job
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Lowercase Image URL
        id: prepare_vars
        run: |
          REPO_NAME_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          # สร้าง URL เต็มรูปแบบสำหรับการ Pull
          echo "IMAGE_URL=ghcr.io/jeyzdev/${REPO_NAME_LC}:${{ github.ref_name }}" >> $GITHUB_ENV

      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.0
        env:
          CONTAINER_NAME: 'wisarut-vue-app'
        with:
          host: '167.172.92.228'
          username: 'root'
          password: 'se@2026NPRU'
          port: '22'
          envs: CONTAINER_NAME, IMAGE_URL
          script: |
            # Login ด้วยชื่อพิมพ์เล็ก
            docker login -u jeyzdev -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
            docker rm -f $CONTAINER_NAME || true
            docker pull $IMAGE_URL
            docker run --restart=always -d --name $CONTAINER_NAME -p 8088:80 $IMAGE_URL