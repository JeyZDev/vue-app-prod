name: 'build and deploy production'

on:
  push:
    tags:
      - '*'

jobs:
  release-docker-image-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image and push to GitHub Packages (Docker Registry)
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: ${{ github.event.repository.name }}
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  auto-deploy-docker-job:
    needs: release-docker-image-job
    runs-on: ubuntu-latest
    env:
      CONTAINER_NAME: 'jeyz9-vue-app'
      # แปลงชื่อ repository และ tag ให้เป็น lowercase
      DOCKER_IMAGE_URL: 'ghcr.io/${{ github.actor }}/$(echo "${{ github.event.repository.name }}" | tr "[:upper:]" "[:lower:]"):${{ github.ref_name | tr "[:upper:]" "[:lower:]" }}'
    steps:
    - name: executing remote ssh commands using password
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: '167.172.92.228'  #production url: 159.223.41.181:9003
        username: 'root'
        password: 'se@2026NPRU'
        port: '22'
        script: |
          # ทำการ logout ก่อน
          docker logout ghcr.io
          # login กับ GitHub Container Registry ด้วยชื่อ repository ที่เป็น lowercase
          docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io/${{ github.actor }}/$(echo "${{ github.event.repository.name }}" | tr "[:upper:]" "[:lower:]")
          # ลบ container ถ้ามี
          docker rm -f ${{ env.CONTAINER_NAME }} || true
          # Pull image ที่เป็น lowercase
          docker pull ${{ env.DOCKER_IMAGE_URL }}
          # Run Docker container
          docker run --restart=always -d --name ${{ env.CONTAINER_NAME }} -p 8088:80 ${{ env.DOCKER_IMAGE_URL }}