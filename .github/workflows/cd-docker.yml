name: 'build and deploy production'

on:
  push:
    tags:
      - '*'

jobs:
  release-docker-image-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. สร้าง Step เพื่อคำนวณชื่อที่เป็นตัวพิมพ์เล็กทั้งหมด
      - name: Prepare lowercase image name
        id: prep
        run: |
          # แปลงชื่อ Repo และ Owner ให้เป็น lowercase ทั้งหมด
          # จาก JeyZDev/vue-app-prod จะกลายเป็น jeyzdev/vue-app-prod
          LOWER_IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_path=$LOWER_IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build image and push to GitHub Packages
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          # 2. ใช้ค่าจาก Step prepare ด้านบน (ไม่มีตัวพิมพ์ใหญ่แน่นอน)
          image: ${{ steps.prep.outputs.image_path }}
          registry: ghcr.io
          username: jeyzdev  # แนะนำให้พิมพ์ตัวเล็กตรงๆ ไปเลยครับ
          password: ${{ secrets.GITHUB_TOKEN }}
          # เพิ่มบรรทัดนี้เพื่อให้ชื่อ Tag ไม่พ่นตัวพิมพ์ใหญ่ออกมา
          addLatestTag: true


  auto-deploy-docker-job:
    needs: release-docker-image-job
    runs-on: ubuntu-latest
    steps:
      # 1. สร้าง Step เพื่อแปลงชื่อ Repo เป็นตัวพิมพ์เล็กทั้งหมด
      - name: Prepare Lowercase Image Name
        id: prepare_vars
        run: |
          # ใช้คำสั่ง Bashแปลงค่าเป็น lowercase ทั้งหมด
          REPO_NAME_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_URL=ghcr.io/jeyzdev/${REPO_NAME_LC}:${{ github.ref_name }}" >> $GITHUB_ENV

      # 2. นำ ${{ env.IMAGE_URL }} ไปใช้ใน Step ถัดไป
      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.0
        env:
          CONTAINER_NAME: 'wisarut-vue-app'
        with:
          host: '167.172.92.228'
          username: 'root'
          password: 'se@2026NPRU'
          port: '22'
          envs: CONTAINER_NAME, IMAGE_URL # ส่งตัวแปร IMAGE_URL เข้าไปใน SSH
          script: |
            docker login -u jeyzdev -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
            docker rm -f $CONTAINER_NAME || true
            docker pull $IMAGE_URL
            docker run --restart=always -d --name $CONTAINER_NAME -p 8088:80 $IMAGE_URL
