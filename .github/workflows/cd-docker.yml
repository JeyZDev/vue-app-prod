name: 'build and deploy production'

on:
  push:
    tags:
      - '*'

jobs:
  # 1. Job ใหม่เพื่อเตรียมชื่อ Image ที่เป็นตัวพิมพ์เล็ก
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set-vars.outputs.image_name }}
    steps:
      - id: set-vars
        run: |
          # แปลงชื่อเจ้าของและชื่อ repo เป็นตัวพิมพ์เล็ก
          IMAGE_PATH="${GITHUB_REPOSITORY,,}"
          echo "image_name=$IMAGE_PATH" >> $GITHUB_OUTPUT

  release-docker-image-job:
    needs: prepare # ต้องรอให้ Job prepare เสร็จก่อน
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image and push to GitHub Packages
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          # ใช้ค่าที่เตรียมไว้จาก Job prepare
          image: ${{ needs.prepare.outputs.image_name }}
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  auto-deploy-docker-job:
    needs: [prepare, release-docker-image-job] # รอทั้งคู่
    runs-on: ubuntu-latest
    env:
      CONTAINER_NAME: 'wisarut-vue-app'
      # ดึงค่า image_name ที่เป็นตัวพิมพ์เล็กมาใช้
      DOCKER_IMAGE_URL: 'ghcr.io/${{ needs.prepare.outputs.image_name }}:${{ github.ref_name }}'
    steps:
    - name: executing remote ssh commands
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: '167.172.92.228'
        username: 'root'
        password: 'se@2026NPRU' # แนะนำให้เก็บใน GitHub Secrets เพื่อความปลอดภัยนะครับ
        port: '22'
        script: |
          # แปลง username เป็นตัวพิมพ์เล็กสำหรับการ login
          LOWER_ACTOR=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          docker login -u $LOWER_ACTOR -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
          
          docker rm -f ${{ env.CONTAINER_NAME }} || true
          docker pull ${{ env.DOCKER_IMAGE_URL }}
          docker run --restart=always -d --name ${{ env.CONTAINER_NAME }} -p 8088:80 ${{ env.DOCKER_IMAGE_URL }}